<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">KaimiEwl portfolio banner</title>
  <desc id="desc">A dark portfolio banner showing apps, games, bots and automation systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.56" stop-color="#10263a"/>
      <stop offset="1" stop-color="#13261f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <circle cx="1020" cy="78" r="88" fill="#38bdf8" opacity="0.15"/>
  <circle cx="970" cy="340" r="130" fill="#14b8a6" opacity="0.12"/>
  <circle cx="1140" cy="300" r="110" fill="#f97316" opacity="0.12"/>

  <g transform="translate(72 70)">
    <rect x="0" y="0" width="182" height="32" rx="16" fill="#0f766e"/>
    <text x="18" y="21" fill="#ecfeff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1">WORKING PORTFOLIO</text>

    <text x="0" y="92" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="900">Apps, bots, games</text>
    <text x="0" y="152" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="900">and automations</text>
    <text x="0" y="212" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="52" font-weight="900">you can open.</text>

    <text x="0" y="256" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Client-facing web apps, browser games, Telegram bots,</text>
    <text x="0" y="284" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">AI workers, video pipelines and n8n automation systems.</text>

    <rect x="0" y="304" width="186" height="40" rx="20" fill="#f8fafc"/>
    <text x="22" y="330" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">kaimiewl.github.io</text>
    <rect x="204" y="304" width="132" height="40" rx="20" fill="#2563eb"/>
    <text x="229" y="330" fill="#eff6ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">Live demos</text>
  </g>

  <g transform="translate(700 58)" filter="url(#shadow)">
    <rect x="0" y="0" width="402" height="304" rx="24" fill="url(#panel)"/>
    <rect x="28" y="28" width="346" height="54" rx="16" fill="#0f172a"/>
    <circle cx="56" cy="55" r="7" fill="#fb7185"/>
    <circle cx="78" cy="55" r="7" fill="#fbbf24"/>
    <circle cx="100" cy="55" r="7" fill="#34d399"/>
    <text x="128" y="61" fill="#e2e8f0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Project command center</text>

    <g transform="translate(28 106)">
      <rect x="0" y="0" width="158" height="72" rx="18" fill="#ecfeff"/>
      <rect x="18" y="18" width="42" height="36" rx="10" fill="#14b8a6"/>
      <path d="M31 39h18M31 31h12" stroke="#ecfeff" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900">Profile app</text>
      <text x="76" y="50" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">EWL flow</text>
    </g>

    <g transform="translate(216 106)">
      <rect x="0" y="0" width="158" height="72" rx="18" fill="#eff6ff"/>
      <rect x="18" y="18" width="42" height="36" rx="10" fill="#2563eb"/>
      <path d="M31 28l18 10-18 10z" fill="#eff6ff"/>
      <text x="76" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900">Browser game</text>
      <text x="76" y="50" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Hook &amp; Loot</text>
    </g>

    <g transform="translate(28 202)">
      <rect x="0" y="0" width="158" height="72" rx="18" fill="#fff7ed"/>
      <rect x="18" y="18" width="42" height="36" rx="10" fill="#f97316"/>
      <path d="M30 36h18M39 27v18" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900">AI worker</text>
      <text x="76" y="50" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Video render</text>
    </g>

    <g transform="translate(216 202)">
      <rect x="0" y="0" width="158" height="72" rx="18" fill="#f0fdf4"/>
      <rect x="18" y="18" width="42" height="36" rx="10" fill="#16a34a"/>
      <path d="M29 32h20M29 42h20" stroke="#f0fdf4" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900">Automation</text>
      <text x="76" y="50" fill="#475569" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">n8n systems</text>
    </g>
  </g>
</svg>
