<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">KaimiEwl working portfolio</title>
  <desc id="desc">A clean portfolio banner for apps, games, bots, AI workers and automation systems.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d8e2ea" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <a href="https://kaimiewl.github.io/" target="_top">
  <rect width="1200" height="360" fill="#f7fafc"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity="0.7"/>
  <rect x="0" y="0" width="1200" height="10" fill="#0f766e"/>
  <rect x="0" y="10" width="1200" height="2" fill="#2563eb"/>

  <g transform="translate(70 52)">
    <rect x="0" y="0" width="176" height="30" rx="6" fill="#0f766e"/>
    <text x="16" y="20" fill="#ecfeff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800">WORKING PORTFOLIO</text>

    <text x="0" y="92" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="900">KaimiEwl</text>
    <text x="0" y="134" fill="#1f2937" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="26" font-weight="800">Apps, games, bots and automation systems</text>
    <text x="0" y="174" fill="#52616f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Public demos, clean repositories and client-readable case studies.</text>

    <g transform="translate(0 214)">
      <path d="M0 0H460" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="8" cy="32" r="5" fill="#0f766e"/>
      <text x="24" y="38" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">kaimiewl.github.io</text>
      <text x="178" y="38" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">public project showcase</text>
    </g>
  </g>

  <g transform="translate(670 44)" filter="url(#softShadow)">
    <rect x="0" y="0" width="430" height="272" rx="12" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="0" y="0" width="430" height="48" rx="12" fill="#111827"/>
    <path d="M0 36H430V48H0Z" fill="#111827"/>
    <circle cx="28" cy="24" r="6" fill="#fb7185"/>
    <circle cx="50" cy="24" r="6" fill="#f59e0b"/>
    <circle cx="72" cy="24" r="6" fill="#10b981"/>
    <text x="104" y="30" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">Project stack</text>

    <g transform="translate(24 72)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="#ecfeff" stroke="#bae6fd"/>
      <rect x="16" y="17" width="36" height="36" rx="8" fill="#0f766e"/>
      <path d="M26 29h16M26 38h22" stroke="#ecfeff" stroke-width="4" stroke-linecap="round"/>
      <text x="68" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="900">EWL app</text>
      <text x="68" y="50" fill="#52616f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Nutrition profile flow</text>

      <rect x="204" y="0" width="180" height="70" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
      <rect x="220" y="17" width="36" height="36" rx="8" fill="#2563eb"/>
      <path d="M232 27l15 9-15 9z" fill="#eff6ff"/>
      <text x="272" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="900">Games</text>
      <text x="272" y="50" fill="#52616f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Hook &amp; Loot, NFT Miner</text>
    </g>

    <g transform="translate(24 158)">
      <rect x="0" y="0" width="180" height="70" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
      <rect x="16" y="17" width="36" height="36" rx="8" fill="#f97316"/>
      <path d="M26 35h16M34 27v16" stroke="#fff7ed" stroke-width="4" stroke-linecap="round"/>
      <text x="68" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="900">AI workers</text>
      <text x="68" y="50" fill="#52616f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Video render queue</text>

      <rect x="204" y="0" width="180" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
      <rect x="220" y="17" width="36" height="36" rx="8" fill="#16a34a"/>
      <path d="M231 31h15M231 40h15" stroke="#f0fdf4" stroke-width="4" stroke-linecap="round"/>
      <text x="272" y="30" fill="#0f172a" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="900">Automation</text>
      <text x="272" y="50" fill="#52616f" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">n8n, bots, monitors</text>
